version: "3.9"
services:
  db:
    image: postgres:16
    container_name: drupal_db
    environment:
      POSTGRES_DB: drupal
      POSTGRES_USER: drupal
      POSTGRES_PASSWORD: drupal
    volumes:
      - db_data:/var/lib/postgresql/data
  drupal:
    image: drupal:10-apache
    container_name: drupal_app
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      DRUPAL_DB_HOST: db
      DRUPAL_DB_NAME: drupal
      DRUPAL_DB_USER: drupal
      DRUPAL_DB_PASSWORD: drupal
    volumes:
      - ./drupal_modules:/var/www/html/modules/custom
      - ./drupal_themes:/var/www/html/themes/custom
      - ./drupal_profiles:/var/www/html/profiles/custom
      - ./drupal_files:/var/www/html/sites/default/files
volumes:
  db_data:
